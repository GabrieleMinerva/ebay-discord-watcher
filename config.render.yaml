# Config specifica per deploy Render.
# Supporta placeholder ${VAR} risolti a runtime da environment.

# Parametri eBay Browse API
ebay:
  # Marketplace target (EBAY_IT, EBAY_US, ...)
  marketplace_id: EBAY_IT
  # Endpoint base API eBay
  base_url: https://api.ebay.com

# Persistenza stato annunci già pubblicati
storage:
  # Valore preso da env: SQLITE_PATH
  sqlite_path: ${SQLITE_PATH}

# Elenco query monitorate
queries:
  - name: "game boy"
    enabled: true
    # Intervallo polling in secondi
    interval_seconds: 30
    keywords: "game boy"
    price_min: 1
    price_max: 60
    currency: EUR
    location_country: IT
    discord:
      # Webhook preso da env: DISCORD_WEBHOOK_URL
      webhook_url: "${DISCORD_WEBHOOK_URL}"
